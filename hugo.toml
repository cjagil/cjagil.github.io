# --- Site configuration -------------------------------------------------
# When you set up a free GitHub Pages site, change baseURL to:
#   https://YOURUSERNAME.github.io/
# (or your custom domain later). The trailing slash matters.
baseURL = "https://example.github.io/"
languageCode = "en-us"
title = "Curtis Gile"
# Keep the site fast and clean: no pagination clutter, readable dates.
enableEmoji = true

[params]
  # Shown under the site title on the homepage. Edit freely.
  tagline = "Essays, notes, and a small library of things worth keeping."
  author = "Curtis Gile"
  # Your email or social links show in the footer. Leave blank to hide.
  email = "curtis.j.gile@gmail.com"

# Navigation links across the top of every page.
[menu]
  [[menu.main]]
    name = "Essays"
    url = "/essays/"
    weight = 1
  [[menu.main]]
    name = "Library"
    url = "/library/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

# Markdown rendering: allow raw HTML in posts and nice typography.
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
