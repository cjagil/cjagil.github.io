{{ define "main" }}
  <article class="page essay">
    <h1>{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
      <p class="byline">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
        {{ with .Params.subtitle }} · {{ . }}{{ end }}
      </p>
    {{ end }}
    <div class="prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
